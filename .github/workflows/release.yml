name: Release

# Builds a signed (debug-key) release APK whenever a v* tag is pushed and uploads it to
# the matching GitHub Release (creating the release if it doesn't exist yet).
on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk ActionCut-${{ github.ref_name }}.apk

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: ActionCut-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
