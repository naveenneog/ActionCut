name: Instrumented tests

# Runs the on-device (emulator) integration tests that exercise the real ExoPlayer +
# Media3 Transformer media stack — the layer unit/Robolectric tests can't reach. These
# guard against regressions of the playback (cumulative playhead) and export (GL shader
# uniform) bugs.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented:
    name: core:media on emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run core:media instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -no-snapshot -no-boot-anim -no-audio -gpu swiftshader_indirect
          disable-animations: true
          script: ./gradlew :core:media:connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: 'core/media/build/reports/androidTests/**'
          if-no-files-found: ignore
